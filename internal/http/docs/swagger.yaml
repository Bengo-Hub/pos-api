basePath: /api/v1
definitions:
  documents.SeqConfigDTO:
    properties:
      current_val:
        type: integer
      date_format:
        type: string
      doc_type:
        type: string
      next_number:
        type: string
      padding:
        type: integer
      prefix:
        type: string
      reset_freq:
        type: string
      separator:
        type: string
    type: object
  handlers.bulkClientImportResult:
    properties:
      created:
        type: integer
      failed:
        type: integer
      results:
        items:
          $ref: '#/definitions/handlers.bulkClientRowResult'
        type: array
      updated:
        type: integer
    type: object
  handlers.bulkClientRowResult:
    properties:
      client_id:
        type: string
      error:
        type: string
      external_ref:
        type: string
      status:
        description: created | updated | failed
        type: string
    type: object
  handlers.bulkDeleteOrdersInput:
    properties:
      order_ids:
        items:
          type: string
        type: array
    type: object
  handlers.bulkDeleteOrdersResult:
    properties:
      deleted:
        type: integer
      skipped:
        items:
          $ref: '#/definitions/handlers.bulkSkippedItem'
        type: array
    type: object
  handlers.bulkSkippedItem:
    properties:
      id:
        type: string
      reason:
        type: string
    type: object
  handlers.bulkVoidOrdersInput:
    properties:
      order_ids:
        items:
          type: string
        type: array
      reason:
        type: string
    type: object
  handlers.bulkVoidOrdersResult:
    properties:
      skipped:
        items:
          $ref: '#/definitions/handlers.bulkSkippedItem'
        type: array
      voided:
        type: integer
    type: object
  handlers.livenessResponse:
    properties:
      service:
        example: pos-service
        type: string
      status:
        example: ok
        type: string
    type: object
  handlers.readinessResponse:
    properties:
      dependencies:
        additionalProperties:
          type: string
        type: object
      status:
        example: OK
        type: string
    type: object
info:
  contact: {}
  description: HTTP API for the Codevertex POS service. Provides point-of-sale operations,
    order management, and cash drawer management.
  title: POS Service API
  version: 0.1.0
paths:
  /{tenantID}/pos/clients/bulk-import:
    post:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.bulkClientImportResult'
      summary: Bulk import/upsert POS client records
      tags:
      - clients
  /{tenantID}/pos/document-sequences:
    get:
      description: Per-doc-type sequence configuration (numeric by default) for order,
        receipt, return, reversal and repair-job numbers.
      parameters:
      - description: Tenant ID
        in: path
        name: tenantID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - bearerAuth: []
      summary: List POS document-numbering configs
      tags:
      - document-numbering
  /{tenantID}/pos/document-sequences/{docType}:
    put:
      consumes:
      - application/json
      description: Sets prefix/separator/date format/padding for a doc type. Empty
        prefix + empty date_format = pure numeric.
      parameters:
      - description: Tenant ID
        in: path
        name: tenantID
        required: true
        type: string
      - description: Document type
        in: path
        name: docType
        required: true
        type: string
      - description: Format settings
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/documents.SeqConfigDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/documents.SeqConfigDTO'
      security:
      - bearerAuth: []
      summary: Update a POS document-numbering config
      tags:
      - document-numbering
  /{tenantID}/pos/document-sequences/{docType}/preview:
    get:
      description: Returns the next number for a doc type without incrementing the
        counter.
      parameters:
      - description: Tenant ID
        in: path
        name: tenantID
        required: true
        type: string
      - description: Document type (order, pos_receipt, pos_return, pos_reversal,
          repair_job)
        in: path
        name: docType
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - bearerAuth: []
      summary: Preview next POS document number
      tags:
      - document-numbering
  /{tenantID}/pos/orders/bulk-delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: IDs of the draft orders to delete
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.bulkDeleteOrdersInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.bulkDeleteOrdersResult'
      summary: Bulk-delete draft (parked) sales
      tags:
      - orders
  /{tenantID}/pos/orders/bulk-void:
    post:
      consumes:
      - application/json
      parameters:
      - description: IDs of the orders to void + the shared void reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.bulkVoidOrdersInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.bulkVoidOrdersResult'
      summary: Bulk-void unsettled orders
      tags:
      - orders
  /healthz:
    get:
      description: Returns OK when the POS API process is running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.livenessResponse'
      summary: Service liveness probe
      tags:
      - Health
  /metrics:
    get:
      description: Exposes Prometheus metrics for scraping.
      produces:
      - text/plain
      responses:
        "200":
          description: Prometheus metrics payload
          schema:
            type: string
      summary: Prometheus metrics
      tags:
      - Health
  /readyz:
    get:
      description: Validates connectivity to Postgres, Redis, and NATS backends.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.readinessResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/handlers.readinessResponse'
      summary: Readiness probe
      tags:
      - Health
schemes:
- http
- https
securityDefinitions:
  bearerAuth:
    description: 'JWT token from auth-service. Format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
